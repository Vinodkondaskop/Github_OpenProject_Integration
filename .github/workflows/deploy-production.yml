name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Notify OpenProject - production in progress
        env:
          BRIDGE_URL: ${{ secrets.OPENPROJECT_BRIDGE_URL }}
          SECRET: ${{ secrets.OPENPROJECT_WEBHOOK_SECRET }}
        run: |
          BODY=$(jq -cn --arg env production --arg status in_progress \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg branch "${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" \
            --arg commit "$GITHUB_SHA" \
            --arg commitMessage "$(git log -1 --pretty=%B)" \
            --arg deployedBy "$GITHUB_ACTOR" \
            --arg workflow "$GITHUB_WORKFLOW" \
            '{environment:$env,status:$status,repository:$repo,branch:$branch,commit:$commit,commitMessage:$commitMessage,deployedBy:$deployedBy,workflow:$workflow}')
          SIG="sha256=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$SECRET" | sed 's/^.* //')"
          curl -sS -X POST "$BRIDGE_URL/deployments" -H "Content-Type: application/json" -H "X-Hub-Signature-256: $SIG" --data "$BODY"

      - name: Deploy to production
        run: echo "Simulating production deploy (replace with real deploy command)."

      - name: Notify OpenProject - production result
        if: always()
        env:
          BRIDGE_URL: ${{ secrets.OPENPROJECT_BRIDGE_URL }}
          SECRET: ${{ secrets.OPENPROJECT_WEBHOOK_SECRET }}
          RESULT: ${{ job.status }}
        run: |
          STATUS=success
          [ "$RESULT" = "success" ] || STATUS=failure
          BODY=$(jq -cn --arg env production --arg status "$STATUS" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg branch "${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" \
            --arg commit "$GITHUB_SHA" \
            --arg commitMessage "$(git log -1 --pretty=%B)" \
            --arg deployedBy "$GITHUB_ACTOR" \
            --arg url "https://app.example.com" \
            --arg workflow "$GITHUB_WORKFLOW" \
            '{environment:$env,status:$status,repository:$repo,branch:$branch,commit:$commit,commitMessage:$commitMessage,deployedBy:$deployedBy,url:$url,workflow:$workflow}')
          SIG="sha256=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$SECRET" | sed 's/^.* //')"
          curl -sS -X POST "$BRIDGE_URL/deployments" -H "Content-Type: application/json" -H "X-Hub-Signature-256: $SIG" --data "$BODY"
